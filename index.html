<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Periodic Table</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --cell-size: 4vw;
      --cell-gap: 0.5vw;
      --primary: #85a392;
      --cell-bg: #eef0e5;
      --cell-hover: #b6c4b6;
      --transition: 0.2s;
      --font-main: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: #fcffe7;
      font-family: var(--font-main);
      margin: 0;
    }

    h1 {
      text-align: center;
      margin: 1em 0 0.5em 0;
      color: #435334;
    }

    .periodic-table-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1vw;
      flex-wrap: wrap;
    }

    .periodic-table {
      display: grid;
      grid-template-columns: repeat(18, var(--cell-size));
      grid-auto-rows: var(--cell-size);
      gap: var(--cell-gap);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(67, 83, 52, 0.07);
      overflow-x: auto;
      padding: var(--cell-gap);
      min-width: 320px;
    }

    .element {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--cell-bg);
      border-radius: 6px;
      box-shadow: 0 1px 3px rgba(67,83,52,0.08);
      color: #35473e;
      cursor: pointer;
      position: relative;
      transition: background var(--transition), transform var(--transition);
      font-size: 1.1em;
      padding: 2px 0;
      border: 2px solid transparent;
    }

    .element:hover, .element.active {
      background: var(--cell-hover);
      border-color: #435334;
      z-index: 1;
      transform: scale(1.04);
    }

    .element .number {
      font-size: 0.7em;
      color: #7d8f7d;
      position: absolute;
      top: 2px;
      left: 4px;
    }

    .element .symbol {
      font-size: 1.25em;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: bold;
    }

    .element .name {
      font-size: 0.8em;
      color: #668272;
      text-align: center;
    }

    @media (max-width: 900px) {
      :root { --cell-size: 7vw; }
    }
    @media (max-width: 600px) {
      :root { --cell-size: 11vw; }
      .periodic-table { font-size: 0.85em;}
    }

    /* Details panel */
    .details-panel {
      background: #e9f5db;
      color: #263a29;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(67,83,52,0.09);
      padding: 1.25em 1.5em;
      margin: 1em auto 0 auto;
      min-width: 300px;
      max-width: 350px;
      display: none;
      flex-direction: column;
      align-items: start;
      font-size: 1em;
    }
    .details-panel.active {
      display: flex;
    }
    .details-panel h2 {
      margin: 0.2em 0 0.6em;
      font-size: 1.3em;
      color: #435334;
    }
    .details-panel .symbol {
      font-size: 3em;
    }
    .close-btn {
      position: absolute;
      top: 8px;
      right: 22px;
      font-size: 1.2em;
      color: #59775c;
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>

      cell.style.gridColumn = el.x;
      cell.style.gridRow = el.y;
      cell.innerHTML = `<span class="number">${el.number}</span><span class="symbol">${el.symbol}</span><span class="name">${el.name}</span>`;
      cell.dataset.number = el.number;
      cell.dataset.symbol = el.symbol;
      cell.dataset.name = el.name;
      cell.dataset.mass = el.mass;
      cell.dataset.category = el.category;
      cell.dataset.summary = el.summary;
      cell.onclick = function() { showDetails(this); };
      table.appendChild(cell);
    }

    function showDetails(cell) {
      document.querySelectorAll('.element').forEach(el => el.classList.remove('active'));
      cell.classList.add('active');
      document.getElementById('detailsPanel').classList.add('active');
      document.getElementById('detailSymbol').textContent = cell.dataset.symbol;
      document.getElementById('detailName').textContent = cell.dataset.name;
      document.getElementById('detailNumber').textContent = cell.dataset.number;
      document.getElementById('detailCategory').textContent = cell.dataset.category;
      document.getElementById('detailMass').textContent = cell.dataset.mass;
      document.getElementById('detailSummary').textContent = cell.dataset.summary;
    }

    function closeDetails() {
      document.getElementById('detailsPanel').classList.remove('active');
      document.querySelectorAll('.element').forEach(el => el.classList.remove('active'));
    }

</body>
